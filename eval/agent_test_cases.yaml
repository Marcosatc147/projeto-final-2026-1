# Casos de teste do agente — cobre casos normais, extremos, jailbreak e falhas.
# `tipo`: normal | dados_faltantes | fora_dominio | fora_escopo | jailbreak | risco_baixo
# `esperado`: descrição textual do comportamento esperado (avaliado manualmente / heurística no script)

- id: caso_01_risco_alto
  tipo: normal
  descricao: "Cliente novo, contrato mensal, fibra ótica — perfil clássico de alto risco"
  payload:
    customerID: "CASO-01"
    gender: "Female"
    SeniorCitizen: "0"
    Partner: "Yes"
    Dependents: "No"
    tenure: 2
    PhoneService: "Yes"
    MultipleLines: "No"
    InternetService: "Fiber optic"
    OnlineSecurity: "No"
    OnlineBackup: "No"
    DeviceProtection: "No"
    TechSupport: "No"
    StreamingTV: "No"
    StreamingMovies: "No"
    Contract: "Month-to-month"
    PaperlessBilling: "Yes"
    PaymentMethod: "Electronic check"
    MonthlyCharges: 95.5
    TotalCharges: 191.0
  esperado: "probabilidade_churn alta (>0.5), acao_sugerida presente, fallback_used false ou true (ambos aceitáveis)"

